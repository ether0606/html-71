<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <form action="">
        <label for="id">ID:</label>
        <input type="text" id="id" name="id"><br><br>

        <label for="name">Name:</label>
        <textarea name="name" id="name"></textarea><br><br>

        <label for="round">Round:</label>
        <select name="round" id="round">
            <option value="round70">Round 70</option>
            <option value="round71">Round 71</option>
            <option value="round72">Round 72</option>
        </select><br><br>

        <label for="gender">Gender:</label>
        <input type="radio" name="gender" id="male" value="male">
        <label for="male">Male</label>
        <input type="radio" name="gender" id="female" value="female">
        <label for="female">Female</label>
        <br><br>

        <label for="Education">Education:</label>
        <input type="checkbox" name="education" id="ssc" value="ssc">
        <label for="ssc">SSC</label>
        <input type="checkbox" name="education" id="hsc" value="hsc">
        <label for="hsc">HSC</label>
        <br><br>

        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
</body>
</html>
