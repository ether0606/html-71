<!DOCTYPE html>
<html>
    <head>
        <title>Page 147</title>
        
    </head>
    <body>
       <form method="post" enctype="multipart/form-data" action="">
        <!-- profile picture  -->
        <label for="profile-picture">Profile Picture:</label>
        <input type="file" id="profile-picture" name="profile-picture" accept="image/*"><br><br>

        <label for="name">Name:</label>
        <input placeholder="Full Name" type="text" id="name" pattern="[A-Za-z0-9]{2,50}" name="name" required size="50" maxlength="5" minlength="2"><br><br>
        <label for="email">Email:</label>
        <input type="email" value="kamal@yahoo.com" readonly id="email" name="email"><br><br>
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob"><br><br>
        <label for="country">Country:</label>
        <select multiple name="country" id="country">
            <option value="us">United States</option>
            <option value="ca">Canada</option>
            <option value="uk">United Kingdom</option>
        </select><br><br>

        <input type="checkbox" checked name="newsletter" id="newsletter">
        <label for="newsletter">Subscribe to newsletter</label><br><br>
        <input type="checkbox" name="newsletter" id="newsletter">
        <label for="newsletter">Subscribe to newsletter</label><br><br>

        <!-- radio buttons -->
         <fieldset>
            <legend>Gender</legend>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label> 
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label> 
            <input type="radio" id="other" name="gender" value="other">
            <label for="other">Other</label> 
         </fieldset>
        

        <!-- comment -->
        <label for="comments">Comments:</label><br>
        <textarea autofocus id="comments" name="comments" rows="4" cols="50"></textarea><br><br>

        <input type="submit" disabled value="Submit">
        <button type="button">button</button>
        <button type="reset">Reset</button>


       </form>
       
    </body>
</html>
